# Buildspec for atom-logistic backend (Node.js Docker)
# Env vars from Terraform CodeBuild: ECR_URI, CONTAINER_NAME, DOCKERFILE_PATH, DOCKER_BUILD_CONTEXT
# CodePipeline sources repo; output goes to ECR for ECS deploy.
version: 0.2

phases:
  pre_build:
    commands:
      - cd backend
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
      - export IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - echo "Image tag (short SHA):" $IMAGE_TAG
      - echo "Building Docker image..."
  build:
    commands:
      - echo "Building Docker image..."
      - docker build -t $ECR_URI:$IMAGE_TAG .
      - echo "Pushing image..."
      - docker push $ECR_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Writing image definitions file
      - printf '[{"name":"%s","imageUri":"%s"}]' $CONTAINER_NAME $ECR_URI:$IMAGE_TAG > ../imagedefinitions.json
      - cat ../imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json